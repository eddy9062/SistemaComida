<ion-app>
  <ion-menu contentId="main-content" *ngIf="auth.isAuthenticated()">
    <ion-header class="ion-no-border">
      <ion-toolbar>
        <ion-title>Menu</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <ion-list class="ion-no-padding side-menu-list">
        <ion-item lines="full">
          <ion-avatar slot="start">
            <img src="assets/icon/logo.png" alt="Logo">
          </ion-avatar>
          <ion-label>
            <h3>{{ auth.session?.usuario || 'Usuario' }}</h3>
            <p>{{ auth.session?.rol || 'Sesion activa' }}</p>
          </ion-label>
        </ion-item>

        <ion-item *ngFor="let item of menu" [routerLink]="item.url" routerDirection="root" lines="none" detail="false" button>
          <ion-icon [name]="item.icon" slot="start"></ion-icon>
          <ion-label>{{ item.title }}</ion-label>
        </ion-item>
      </ion-list>
    </ion-content>

    <ion-footer class="ion-no-border">
      <ion-toolbar class="ion-no-border">
        <ion-item lines="none" button (click)="auth.logout()">
          <ion-icon name="exit-outline" slot="start"></ion-icon>
          <ion-label>Salir</ion-label>
        </ion-item>
      </ion-toolbar>
    </ion-footer>
  </ion-menu>

  <div class="ion-page" id="main-content">
    <ion-router-outlet></ion-router-outlet>
  </div>
</ion-app>
