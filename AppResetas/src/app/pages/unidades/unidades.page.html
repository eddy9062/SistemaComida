<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Unidades de medida</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="page-shell">
    <ion-searchbar mode="ios" placeholder="Buscar unidad" animated inputmode="text" [debounce]="300" (ionInput)="onSearch($event)"></ion-searchbar>

    <app-empty-state *ngIf="!loading && !items.length" title="Sin unidades" message="Cree la primera unidad de medida."></app-empty-state>
    <app-empty-state *ngIf="!loading && items.length && !filteredItems.length" title="Sin resultados" message="Intente con otro texto de busqueda."></app-empty-state>

    <ion-list class="ion-no-padding app-sliding-list" *ngIf="filteredItems.length">
      <ion-list-header mode="ios">
        <ion-label class="mt-0">Listado de unidades</ion-label>
      </ion-list-header>
      <ion-item-sliding *ngFor="let item of filteredItems">
        <ion-item button detail="false" (click)="edit(item)">
          <ion-label>
            <h3>{{ item.nombre }}</h3>
            <p>ID {{ item.id_unidad }}</p>
          </ion-label>
          <ion-label slot="end" class="ion-text-end text-small">{{ item.abreviatura }}</ion-label>
        </ion-item>
        <ion-item-options side="end">
          <ion-item-option color="light" (click)="edit(item)">
            <ion-icon slot="start" class="slide-edit-icon" name="create-outline"></ion-icon>
          </ion-item-option>
          <ion-item-option color="light" (click)="remove(item)">
            <ion-icon slot="start" class="slide-delete-icon" name="trash-sharp"></ion-icon>
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    </ion-list>
  </div>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button (click)="create()">
      <ion-icon name="add-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>

<ion-modal [isOpen]="modalOpen" [keepContentsMounted]="true" cssClass="auto-modal" (didDismiss)="modalOpen = false">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>{{ editing ? 'Editar unidad' : 'Nueva unidad' }}</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="modalOpen = false">
              <ion-icon slot="icon-only" name="close-outline"></ion-icon>
            </ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <form [formGroup]="form" (ngSubmit)="save()">
          <ion-item>
            <ion-label position="stacked">Nombre</ion-label>
            <ion-input formControlName="nombre"></ion-input>
          </ion-item>
          <ion-item>
            <ion-label position="stacked">Abreviatura</ion-label>
            <ion-input formControlName="abreviatura"></ion-input>
          </ion-item>
          <ion-button expand="block" type="submit">Guardar</ion-button>
        </form>
      </ion-content>
    </ng-template>
  </ion-modal>
