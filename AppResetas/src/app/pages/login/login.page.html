<ion-content class="login-content">
  <main class="login-shell">
    <section class="brand">
      <h1>AppResetas</h1>
      <p>Gestion de recetas, menu semanal y compras.</p>
    </section>

    <form class="login-card" [formGroup]="form" (ngSubmit)="ingresar()">
      <h2>Ingresar</h2>

      <ion-item>
        <ion-label position="stacked">Usuario</ion-label>
        <ion-input formControlName="usuario" autocomplete="username"></ion-input>
      </ion-item>

      <ion-note color="danger" *ngIf="form.controls.usuario.touched && form.controls.usuario.invalid">
        Usuario obligatorio.
      </ion-note>

      <ion-item>
        <ion-label position="stacked">Contrasena</ion-label>
        <ion-input type="password" formControlName="password" autocomplete="current-password"></ion-input>
      </ion-item>

      <ion-note color="danger" *ngIf="form.controls.password.touched && form.controls.password.invalid">
        Contrasena obligatoria.
      </ion-note>

      <ion-button type="submit" expand="block" [disabled]="loading">
        <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
        <span *ngIf="!loading">Ingresar</span>
      </ion-button>
    </form>
  </main>
</ion-content>
